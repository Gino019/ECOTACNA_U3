server.port=${SERVER_PORT:8091}
spring.application.name=ecotacna-ai-recommendation-service

# Gemini AI Settings
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.recommendations.enabled=${GEMINI_ENABLED:false}
gemini.timeout.seconds=${GEMINI_TIMEOUT_SECONDS:5}

# Security
internal.ai.service.token=${INTERNAL_AI_SERVICE_TOKEN:default_internal_token_override_me}
